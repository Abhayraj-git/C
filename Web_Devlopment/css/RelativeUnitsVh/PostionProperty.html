<!DOCTYPE html>
<html>
<head>
    <style>
        *
        {
            margin: 0px;
            padding: 0px;
        }
        .box
        {
            margin: 10px;
        }
        #box1
        {
            background-color: red;
            height: 100px;
            width: 100px;
            position: static;
        }
        #box2
        {
            background-color: rgb(20, 160, 50);
            height: 100px;
            width: 100px;
            position: relative ;
            top: 20px;
            left: 200px;
        }
        #box3
        {
            background-color: rgb(44, 7, 103);
            height: 100px;
            width: 100px;
            position: absolute;
            top: 100px;
            width: 100px;
        }
        #box4
        {
            background-color: rgb(186, 9, 113);
            height: 100px;
            width: 100px;
            position: fixed;
        }
    </style>
    <title>Postion Property</title>
</head>
<body>
    <div id="box1" class="box">Box 1</div>
    <div id="box2" class="box">Box 2</div>
    <div id="box3" class="box">Box 3</div>
    <div id="box4" class="box">Box 4</div>
</body>
</html>
